apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment
  template:
    metadata:
      labels:
        app: deployment
    spec:
      containers:
        - name: deployment
          image: krrg14/expense-track:1.0
          ports:
            - containerPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: deployment-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: deployment
  ports:
    - port: 3000
      targetPort: 3000
