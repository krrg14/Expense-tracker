<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenzo - Expense Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="header-inner">
        <div class="brand">
            <div class="brand-badge">E</div>
            <div>
                <h1>Expenzo</h1>
                <p>Smart expense & budget planner</p>
            </div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="add.html">Add</a>
            <a class="active" href="records.html">Records</a>
            <a href="summary.html">Summary</a>
            <a href="login.html" id="loginNavLink">Login</a>
            <div id="userProfileBadge" class="user-profile-badge" hidden>
                <span class="user-profile-avatar" id="profileAvatar">U</span>
                <span class="user-profile-text">
                    <strong id="profileName">User</strong>
                    <small>Signed in</small>
                </span>
            </div>
            <a href="#" data-action="logout" onclick="logout(); return false;" id="logoutNavLink" style="display:none;">Logout</a>
        </nav>
    </div>
</header>

<main class="page-shell">
    <section class="glass-card table-card">
        <div class="section-header">
            <div>
                <h3>Expense records</h3>
                <p>Review recent spending and manage entries in one place.</p>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </section>
</main>

<footer>© 2026 Expenzo, Inc. All rights reserved ~ Persistent records.</footer>
<script src="script.js"></script>
</body>
</html>
